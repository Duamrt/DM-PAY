; DM Pay - Agent local de sincronizacao
; Copie este arquivo pra config.ini e preencha os valores

[app]
; UUID da empresa no DM Pay (a gente envia depois pelo cadastro)
company_id = 00000000-0000-0000-0000-000000000000

[supabase]
; URL do projeto DM Pay no Supabase. Pode tambem definir via env var DMSYNC_SUPABASE_URL.
url = https://ufxldjdppaonskxhmosi.supabase.co

; PREFERIDO: definir a chave via variavel de ambiente Windows (nao plaintext no arquivo).
; No PowerShell:
;   setx DMSYNC_SUPABASE_SECRET_KEY "sb_secret_..."
; Depois reabra o terminal/agendador para a env var ser lida.
;
; Fallback (legacy, plaintext): se preferir, pode preencher service_role_key abaixo.
; NUNCA commit este arquivo se preencher aqui.
service_role_key =

[sqlserver]
; Conexao com SQL Server LOCAL (read-only). Ajuste o nome da instancia se for diferente.
connection_string = DRIVER={SQL Server};SERVER=.\SQLEXPRESS17;DATABASE=icommerce;Trusted_Connection=yes;
